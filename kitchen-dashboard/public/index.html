<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0e0c" />
    <meta name="description" content="DineQR — Scan. Browse. Order. A seamless QR-based restaurant ordering experience." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:title"       content="DineQR — Restaurant Ordering" />
    <meta property="og:description" content="Scan a QR code and order directly from your table." />
    <meta property="og:type"        content="website" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Cormorant Garamond (display) + DM Sans (body) + DM Mono (prices/IDs) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest"         href="%PUBLIC_URL%/manifest.json" />

    <title>DineQR — Restaurant Ordering</title>

    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #0f0e0c;
        color: #f0ede6;
        min-height: 100%;
      }
      /* Hide scrollbar during initial load */
      body { overflow-x: hidden; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run DineQR.</noscript>
    <div id="root"></div>
  </body>
</html>
